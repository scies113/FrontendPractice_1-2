<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заметки (13-18)</title>

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- фавиконка -->
  <link rel="icon" href="/icons/favicon-32x32.png" type="image/png">
  <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">

  <!-- мета-теги для мобильных платформ -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4285f4">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Заметки">

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Мои заметки</h1>
      <div class="status" id="status">
        <span class="status__dot"></span>
        <span class="status__text">Онлайн</span>
      </div>
    </header>

    <main class="main">
      <form class="note-form" id="noteForm">
        <input
          type="text"
          id="noteInput"
          placeholder="Введите новую заметку..."
          required
          autocomplete="off"
        >
        <button type="submit" class="btn btn-primary">Добавить</button>
      </form>

      <ul class="notes-list" id="notesList"></ul>

      <div class="empty-state" id="emptyState">
        <p>📭 Заметок пока нет. Добавьте первую!</p>
      </div>
    </main>

    <footer class="footer">
      <p>Практика №14 — Web App Manifest</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
  <script>
    //регистрация Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          console.log('Service Worker зарегистрирован:', registration.scope);
        } catch (err) {
          console.error(' Ошибка регистрации Service Worker:', err);
        }
      });
    }
  </script>
</body>
</html>
