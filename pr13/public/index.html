<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заметки (Практика 13)</title>
  <link rel="stylesheet" href="/css/styles.css">
  <!-- PWA манифест (опционально) -->
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Мои заметки</h1>
      <div class="status" id="status">
        <span class="status__dot"></span>
        <span class="status__text">Онлайн</span>
      </div>
    </header>

    <main class="main">
      <form class="note-form" id="noteForm">
        <input 
          type="text" 
          id="noteInput" 
          placeholder="Введите новую заметку..." 
          required
          autocomplete="off"
        >
        <button type="submit" class="btn btn-primary">Добавить</button>
      </form>

      <!-- список заметок -->
      <ul class="notes-list" id="notesList">
      </ul>

      <div class="empty-state" id="emptyState">
        <p>📭 Заметок пока нет. Добавьте первую!</p>
      </div>
    </main>

    <footer class="footer">
      <p>Service Worker Demo • Практика №13</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/sw.js', {
            scope: '/'
          });
          console.log('Service Worker зарегистрирован:', registration.scope);
          
          registration.addEventListener('updatefound', () => {
            console.log('Service Worker обновляется');
          });
        } catch (err) {
          console.error('Ошибка регистрации Service Worker:', err);
        }
      });
    }
  </script>
</body>
</html>
