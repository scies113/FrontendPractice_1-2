<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заметки (13-18)</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4285f4">
  <link rel="apple-touch-icon" href="/icons/favicon-152x152.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="app-shell-header">
    <div class="header-top">
      <h1>Заметки — Напоминания</h1>
      <div class="status" id="status">
        <span class="status__dot"></span>
        <span class="status__text">Онлайн</span>
      </div>
    </div>
    <nav class="tabs">
      <button id="home-btn" class="tab active">Главная</button>
      <button id="about-btn" class="tab">О приложении</button>
    </nav>
  </header>

  <main id="app-content" class="app-content"></main>

  <footer class="app-footer">
    <p>Практика №17 — Детализация Push</p>
    <div class="push-controls">
      <button id="enable-push" class="btn btn-success">🔔 Включить уведомления</button>
      <button id="disable-push" class="btn btn-danger" style="display:none;">🔕 Отключить уведомления</button>
    </div>
  </footer>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.log('✅ SW registered:', reg.scope);
        } catch (err) {
          console.error('❌ SW registration failed:', err);
        }
      });
    }
  </script>
</body>
</html>
